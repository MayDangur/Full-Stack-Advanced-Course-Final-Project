<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TaxWise Israel</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            TaxWise Israel 📈
        </div>

        <div class="nav-controls">
            <a href="index.html" class="btn-text">Home</a>
            <a href="register.html" class="btn-filled">Register</a>
        </div>
    </nav>

    <section class="hero-section">

        <div class="form-container">

            <h1>Welcome Back</h1>

            <p class="form-subtitle">
                Sign in to access your personal tax management area.
            </p>

            <form>

                <input type="email" placeholder="Email Address" required>

                <input type="password" placeholder="Password" required>

                <button type="submit" class="btn-primary">
                    Login
                </button>

            </form>

            <p class="form-link">
                Don't have an account?
                <a href="register.html">Register</a>
            </p>

        </div>

    </section>

</body>

</html>
