<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמה | TaxWise Israel</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            TaxWise Israel 📈
        </div>

        <div class="nav-controls">
            <a href="index.html" class="btn-text">דף הבית</a>
            <a href="login.html" class="btn-filled">התחברות</a>
        </div>
    </nav>

    <section class="hero-section">

        <div class="form-container">

            <h1>יצירת חשבון חדש</h1>

            <p class="form-subtitle">
                הצטרפו ל-TaxWise והתחילו לנהל את בקשות המס שלכם בצורה חכמה.
            </p>

            <form>

                <input type="text" placeholder="שם מלא" required>

                <input type="email" placeholder="אימייל" required>

                <input type="password" placeholder="סיסמה" required>

                <input type="password" placeholder="אימות סיסמה" required>

                <button type="submit" class="btn-primary">
                    הרשמה
                </button>

            </form>

            <p class="form-link">
                כבר יש לך חשבון?
                <a href="login.html">להתחברות</a>
            </p>

        </div>

    </section>

</body>

</html>
