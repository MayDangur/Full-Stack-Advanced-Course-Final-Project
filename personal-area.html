<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Area | TaxWise Israel</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            TaxWise Israel 📈
        </div>

        <div class="nav-controls">
            <a href="index.html" class="btn-text">Home</a>
            <a href="login.html" class="btn-filled">Logout</a>
        </div>
    </nav>

    <section class="features-section">

        <h1 class="section-title">
            Personal Area
        </h1>

        <p class="form-subtitle">
            Manage all your tax refund requests in one place.
        </p>

        <div style="text-align:center; margin-bottom:40px;">
            <button class="btn-primary">
                + Create New Request
            </button>
        </div>

        <div class="features-grid">

            <div class="f-card">
                <h3>Tax Refund 2025</h3>

                <p>
                    Request Status:
                    <strong>Pending</strong>
                </p>

                <div style="margin-top:20px;">
                    <button class="btn-primary">
                        Edit
                    </button>

                    <button class="btn-secondary">
                        Delete
                    </button>
                </div>
            </div>

            <div class="f-card">
                <h3>Workplace Tax Refund</h3>

                <p>
                    Request Status:
                    <strong>Approved</strong>
                </p>

                <div style="margin-top:20px;">
                    <button class="btn-primary">
                        Edit
                    </button>

                    <button class="btn-secondary">
                        Delete
                    </button>
                </div>
            </div>

            <div class="f-card">
                <h3>Freelance Income Report</h3>

                <p>
                    Request Status:
                    <strong>In Review</strong>
                </p>

                <div style="margin-top:20px;">
                    <button class="btn-primary">
                        Edit
                    </button>

                    <button class="btn-secondary">
                        Delete
                    </button>
                </div>
            </div>

        </div>

    </section>

</body>

</html>
